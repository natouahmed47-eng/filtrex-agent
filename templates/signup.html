<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Filtrex AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
    }
    .logo { font-size: 22px; font-weight: 700; color: #111; letter-spacing: -0.5px; margin-bottom: 6px; }
    .logo span { color: #4f46e5; }
    .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 32px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      color: #111;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 18px;
    }
    input:focus { border-color: #4f46e5; }
    .hint { font-size: 12px; color: #9ca3af; margin-top: -14px; margin-bottom: 16px; }
    button[type="submit"] {
      width: 100%;
      padding: 11px;
      background: #4f46e5;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    button[type="submit"]:hover { background: #4338ca; }
    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .footer-link {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
      color: #6b7280;
    }
    .footer-link a { color: #4f46e5; text-decoration: none; font-weight: 600; }
    .footer-link a:hover { text-decoration: underline; }
    .divider {
      border: none;
      border-top: 1px solid #f3f4f6;
      margin: 24px 0 20px;
    }
    .plan-note {
      background: #ede9fe;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #4f46e5;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Filtrex <span>AI</span></div>
    <p class="subtitle">Create your account — free to start</p>

    <div class="plan-note">
      Each account gets its own isolated workspace. Your data is never shared.
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label for="business_name">Business Name</label>
      <input type="text" id="business_name" name="business_name"
             placeholder="e.g. Veltrix Dental Clinic" required />

      <label for="email">Email</label>
      <input type="text" id="email" name="email"
             placeholder="you@example.com" autocomplete="email" required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             placeholder="At least 6 characters" required />
      <p class="hint">Min. 6 characters</p>

      <button type="submit">Create Account</button>
    </form>

    <div class="footer-link">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
</body>
</html>
