<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — Filtrex AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      color: #111;
    }
    /* Top nav */
    .navbar {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .navbar-brand {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #111;
    }
    .navbar-brand span { color: #4f46e5; }
    .navbar-actions { display: flex; gap: 12px; align-items: center; }
    .btn {
      display: inline-block;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      border: none;
    }
    .btn-ghost {
      background: transparent;
      color: #374151;
      border: 1.5px solid #e5e7eb;
    }
    .btn-ghost:hover { background: #f3f4f6; }
    .btn-danger {
      background: transparent;
      color: #b91c1c;
      border: 1.5px solid #fecaca;
    }
    .btn-danger:hover { background: #fef2f2; }
    /* Page content */
    .page { max-width: 640px; margin: 0 auto; padding: 40px 24px; }
    .page-header { margin-bottom: 28px; }
    .page-title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .page-sub {
      font-size: 14px;
      color: #6b7280;
      margin-top: 4px;
    }
    /* Card */
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      padding: 32px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f3f4f6;
    }
    .field { margin-bottom: 22px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    .hint {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 5px;
    }
    input[type="text"], select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      color: #111;
      outline: none;
      transition: border-color 0.15s;
      background: #fff;
    }
    input:focus, select:focus { border-color: #4f46e5; }
    .form-footer {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 8px;
      padding-top: 24px;
      border-top: 1px solid #f3f4f6;
    }
    button[type="submit"] {
      padding: 10px 24px;
      background: #4f46e5;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button[type="submit"]:hover { background: #4338ca; }
    .success {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #15803d;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 24px;
    }
    @media (max-width: 600px) {
      .navbar { padding: 0 16px; }
      .page { padding: 24px 16px; }
      .card { padding: 24px 18px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">Filtrex <span>AI</span></div>
    <div class="navbar-actions">
      <a href="/dashboard" class="btn btn-ghost">Dashboard</a>
      <a href="/logout" class="btn btn-danger">Logout</a>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1 class="page-title">Business Settings</h1>
      <p class="page-sub">Configure how your AI assistant presents your business</p>
    </div>

    {% if message %}
    <div class="success">{{ message }}</div>
    {% endif %}

    <div class="card">
      <div class="section-label">Business Profile</div>
      <form method="POST">
        <div class="field">
          <label for="business_name">Business Name</label>
          <input type="text" id="business_name" name="business_name" value="{{ biz.business_name }}" placeholder="e.g. Bright Smile Studio" />
        </div>

        <div class="field">
          <label for="services">Services</label>
          <input type="text" id="services" name="services" value="{{ biz.services | join(', ') }}" placeholder="e.g. تنظيف أسنان, تبييض أسنان" />
          <p class="hint">Separate multiple services with commas. Only these services will be accepted during booking.</p>
        </div>

        <div class="field">
          <label for="default_language">Default Language</label>
          <select id="default_language" name="default_language">
            <option value="ar" {% if biz.default_language == 'ar' %}selected{% endif %}>Arabic</option>
            <option value="en" {% if biz.default_language == 'en' %}selected{% endif %}>English</option>
          </select>
        </div>

        <div class="form-footer">
          <button type="submit">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
